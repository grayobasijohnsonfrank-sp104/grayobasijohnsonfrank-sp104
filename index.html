<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --surface2: #1a1e28;
      --border: #252a38;
      --border-active: #3d8ef8;
      --text: #e2e6f0;
      --muted: #6b7280;
      --accent: #3d8ef8;
      --success: #22c55e;
      --danger: #ef4444;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    header span {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: calc(100vh - 61px);
    }

    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-body {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    #dropZone {
      border: 1px dashed var(--border);
      border-radius: 8px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface);
      padding: 32px;
      text-align: center;
    }

    #dropZone:hover,
    #dropZone.dragover {
      border-color: var(--border-active);
      background: rgba(61, 142, 248, 0.04);
    }

    #dropZone .label {
      font-size: 0.9rem;
      color: var(--text);
      font-weight: 500;
    }

    #dropZone .sub {
      font-size: 0.8rem;
      color: var(--muted);
    }

    input[type="file"] { display: none; }

    .file-info {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .image-container {
      flex: 1;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      position: relative;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .placeholder {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      text-align: center;
      padding: 24px;
    }

    .btn {
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 500;
      padding: 11px 20px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.88; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) { border-color: var(--muted); }

    .row {
      display: flex;
      gap: 10px;
    }

    .row .btn { flex: 1; }

    #status {
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      line-height: 1.5;
    }

    #status.running { color: var(--accent); border-color: rgba(61,142,248,0.3); }
    #status.success { color: var(--success); border-color: rgba(34,197,94,0.3); }
    #status.error   { color: var(--danger);  border-color: rgba(239,68,68,0.3); }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(61,142,248,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .detections {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .detection-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .detection-label {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
    }

    .detection-conf {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      background: rgba(61,142,248,0.1);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .no-detections {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        height: auto;
      }
      .panel { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <h1>Traffic Detection</h1>
  <span>YOLOv5 — SP104</span>
</header>

<main>
  <!-- LEFT: Input -->
  <div class="panel">
    <div class="panel-header">Input</div>
    <div class="panel-body">

      <div id="dropZone">
        <span class="label">Drop image here</span>
        <span class="sub">or click to select a file</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" />

      <div class="file-info" id="fileInfo">No file selected</div>

      <div class="image-container" id="inputContainer">
        <div class="placeholder">Input image will appear here</div>
      </div>

      <div class="row">
        <button class="btn btn-primary" id="detectBtn" disabled>Run Detection</button>
        <button class="btn btn-secondary" id="resetBtn">Reset</button>
      </div>

      <div id="status">Select an image to begin.</div>

    </div>
  </div>

  <!-- RIGHT: Output -->
  <div class="panel">
    <div class="panel-header">Output</div>
    <div class="panel-body">

      <div class="image-container" id="outputContainer">
        <div class="placeholder">Annotated result will appear here</div>
      </div>

      <div id="detectionList">
        <div class="no-detections">No detections yet.</div>
      </div>

    </div>
  </div>
</main>

<script>
  const API = 'https://sp104greentraff-traffic-detection-api.hf.space';

  const dropZone       = document.getElementById('dropZone');
  const fileInput      = document.getElementById('fileInput');
  const fileInfo       = document.getElementById('fileInfo');
  const inputContainer = document.getElementById('inputContainer');
  const outputContainer= document.getElementById('outputContainer');
  const detectBtn      = document.getElementById('detectBtn');
  const resetBtn       = document.getElementById('resetBtn');
  const statusBox      = document.getElementById('status');
  const detectionList  = document.getElementById('detectionList');

  let selectedFile = null;

  function setStatus(msg, type = '') {
    statusBox.className = type;
    statusBox.innerHTML = (type === 'running' ? '<span class="spinner"></span>' : '') + msg;
  }

  function showInputImage(file) {
    const url = URL.createObjectURL(file);
    inputContainer.innerHTML = `<img src="${url}" alt="Input" />`;
  }

  function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      setStatus('Please select a valid image file.', 'error');
      return;
    }
    selectedFile = file;
    fileInfo.textContent = file.name;
    showInputImage(file);
    outputContainer.innerHTML = '<div class="placeholder">Run detection to see results.</div>';
    detectionList.innerHTML = '<div class="no-detections">No detections yet.</div>';
    detectBtn.disabled = false;
    setStatus('Image loaded. Press Run Detection.');
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

  detectBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    detectBtn.disabled = true;
    setStatus('Sending to detection server...', 'running');

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const response = await fetch(`${API}/detect/image`, {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        const err = await response.text();
        throw new Error(`Server error ${response.status}: ${err}`);
      }

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);
      outputContainer.innerHTML = `<img src="${url}" alt="Detection result" />`;

      setStatus('Detection complete.', 'success');
      detectionList.innerHTML = '<div class="no-detections">See annotated image for detections.</div>';

    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error');
    } finally {
      detectBtn.disabled = false;
    }
  });

  resetBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.textContent = 'No file selected';
    inputContainer.innerHTML = '<div class="placeholder">Input image will appear here</div>';
    outputContainer.innerHTML = '<div class="placeholder">Annotated result will appear here</div>';
    detectionList.innerHTML = '<div class="no-detections">No detections yet.</div>';
    detectBtn.disabled = true;
    setStatus('Select an image to begin.');
  });
</script>

</body>
</html>
